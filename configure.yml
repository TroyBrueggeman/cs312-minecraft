---
- name: Configure Minecraft server on EC2
  hosts: minecraft
  become: true
  vars:
    aws_region: "us-east-1"
    ecr_account_id: "839583540569"
    ecr_image_tag: "v1.0.0"
    s3_bucket: "cs312-op3-minecraft-world-659800275273983456"
    minecraft_data_dir: "/opt/minecraft/data"

  tasks:
    # ── Prerequisites ──
    - name: Install Docker prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - unzip
        state: present
        update_cache: true

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
        chmod a+r /etc/apt/keyrings/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.asc

    - name: Add Docker apt repository
      shell: |
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: true

    - name: Install AWS CLI v2
      shell: |
        curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
        unzip -q /tmp/awscliv2.zip -d /tmp/awscliv2
        /tmp/awscliv2/aws/install
        rm -rf /tmp/awscliv2 /tmp/awscliv2.zip
      args:
        creates: /usr/local/bin/aws

    # ── ECR authentication ──
    - name: Authenticate Docker to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} \
          | docker login --username AWS --password-stdin \
            {{ ecr_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com
      changed_when: true

    # ── Pull image ──
    - name: Pull pinned Minecraft image from ECR
      community.docker.docker_image:
        name: "{{ ecr_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/cs312-op3-ecr:{{ ecr_image_tag }}"
        source: pull
        force_source: true

    # ── Persistent storage ───
    - name: Create Minecraft data directory on host
      file:
        path: "{{ minecraft_data_dir }}"
        state: directory
        mode: "0755"

    # ── World restore ───
    - name: Restore world data from S3 (skips existing files)
      shell: |
        aws s3 sync s3://{{ s3_bucket }}/world {{ minecraft_data_dir }}/world
      changed_when: false

    # ── Start server ────
    - name: Start Minecraft server container
      community.docker.docker_container:
        name: minecraft
        image: "{{ ecr_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com/cs312-op3-ecr:{{ ecr_image_tag }}"
        state: started
        restart_policy: unless-stopped
        ports:
          - "25565:25565"
        volumes:
          - "{{ minecraft_data_dir }}:/data"
        env:
          EULA: "TRUE"
          MOTD: “Troy Brueggeman - 934-466-697”
